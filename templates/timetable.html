{% extends "base.html" %}
<head>
    <title>{% block title %}timetable html{% endblock %}</title>
</head>
<body>
    {% block header%}Welcome to timetable{% endblock %}

    {% block content %}
    <div class="container text-center">
        <div class="card">
            <div class="card-body">
                <div class="card-title">
                    <h2>Time table</h2>
                </div>
                <table class="table table-light">
                    <tr>
                        <th>Bus</th>
                        <th>Time</th>
                    </tr>
                    <tr>
                        <th>1</th>
                        <th>15:00</th>
                    </tr>
                    <tr>
                        <th>2</th>
                        <th>16:00</th>
                    </tr>
                </table>
            </div>
        </div>
    </div>
    {% endblock %}
</body>
</html>
