{% extends "base.html" %}
<head>
    <title>{% block title %}timetable html{% endblock %}</title>
</head>
<body>
    {% block header%}Welcome to {{ city }} timetable{% endblock %}

    {% block content %}
    <div class="container text-center">
        <div class="card">
            <div class="card-body">
                <div class="card-title">
                    <h2>Timetable</h2>
                </div>
                <table class="table table-light">
                    <tr>
                        <th>Transport</th>
                        <th>Time</th>
                    </tr>
                    {% for item in timetable %}
                        <tr>
                            <th>{{ item.transport }}</th>
                            <th>{{ item.time }}</th>
                        </tr>
                    {% endfor %}
                </table>
            </div>
        </div>
    </div>
    {% endblock %}
</body>
</html>
